global:
  scrape_interval: 15s

# Services run on the host (via `./gradlew bootRun`), not as containers in this
# docker-compose file — only the infra (Postgres/Kafka/Redis/LocalStack) and this
# observability stack run in Docker. host.docker.internal is what lets a container reach
# a host-run process; see docker-compose.yml's prometheus.extra_hosts.
scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: bank-platform-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          service: api-gateway
      - targets: ["host.docker.internal:8081"]
        labels:
          service: user-service
      - targets: ["host.docker.internal:8082"]
        labels:
          service: account-service
      - targets: ["host.docker.internal:8083"]
        labels:
          service: transaction-service
      - targets: ["host.docker.internal:8084"]
        labels:
          service: payment-service
      - targets: ["host.docker.internal:8085"]
        labels:
          service: fraud-service
      - targets: ["host.docker.internal:8086"]
        labels:
          service: notification-service
      - targets: ["host.docker.internal:8087"]
        labels:
          service: reporting-service
      - targets: ["host.docker.internal:8088"]
        labels:
          service: audit-service
