namespace: bank-platform

global:
  imageRegistry: "docker.io/library"
  imageTag: "0.1.0-SNAPSHOT"
  imagePullPolicy: IfNotPresent

  postgres:
    host: postgres.bank-platform.svc.cluster.local
    port: 5432
    database: bank_platform
    username: bank
    password: bank

  kafka:
    bootstrapServers: kafka.bank-platform.svc.cluster.local:9092

  otlp:
    endpoint: http://jaeger-collector.bank-platform.svc.cluster.local:4318/v1/traces

  jwksUri: http://user-service.bank-platform.svc.cluster.local:8081/.well-known/jwks.json

  rateLimit:
    capacity: "100"
    periodSeconds: "60"

  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      memory: 512Mi

# One entry per deployable service. `needsDb`/`needsKafka`/`needsJwks` control which shared
# env vars templates/deployment.yaml wires in; `env` is for service-specific overrides
# (matching each service's application.yml ${VAR:default} placeholders).
services:
  - name: user-service
    port: 8081
    needsDb: true
    needsKafka: false
    needsJwks: false
    replicas: 2

  - name: account-service
    port: 8082
    needsDb: true
    needsKafka: true
    needsJwks: true
    replicas: 2

  - name: transaction-service
    port: 8083
    needsDb: true
    needsKafka: true
    needsJwks: true
    replicas: 2

  - name: payment-service
    port: 8084
    needsDb: true
    needsKafka: true
    needsJwks: true
    replicas: 1

  - name: fraud-service
    port: 8085
    needsDb: false
    needsKafka: true
    needsJwks: false
    replicas: 1

  - name: notification-service
    port: 8086
    needsDb: true
    needsKafka: true
    needsJwks: false
    replicas: 1

  - name: reporting-service
    port: 8087
    needsDb: true
    needsKafka: true
    needsJwks: true
    replicas: 1
    env:
      REPORTS_S3_BUCKET: bank-platform-statements
      REPORTS_S3_REGION: us-east-1

  - name: audit-service
    port: 8088
    needsDb: true
    needsKafka: true
    needsJwks: true
    replicas: 1

  - name: ai-service
    port: 8089
    needsDb: false
    needsKafka: false
    needsJwks: false
    replicas: 1

  - name: api-gateway
    port: 8080
    needsDb: false
    needsKafka: false
    needsJwks: true
    replicas: 2
    service:
      type: ClusterIP
    env:
      USER_SERVICE_URI: http://user-service.bank-platform.svc.cluster.local:8081
      ACCOUNT_SERVICE_URI: http://account-service.bank-platform.svc.cluster.local:8082
      TRANSACTION_SERVICE_URI: http://transaction-service.bank-platform.svc.cluster.local:8083
      AUDIT_SERVICE_URI: http://audit-service.bank-platform.svc.cluster.local:8088
      PAYMENT_SERVICE_URI: http://payment-service.bank-platform.svc.cluster.local:8084
      REPORTING_SERVICE_URI: http://reporting-service.bank-platform.svc.cluster.local:8087

ingress:
  enabled: false
  className: nginx
  host: bank-platform.local
